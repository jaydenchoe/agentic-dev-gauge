<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tiny Monitor</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <header class="header">
    <span class="connection-status" id="connectionStatus" title="Disconnected">
      <span class="connection-status__dot"></span>
      <span class="connection-status__text">Disconnected</span>
    </span>
    <button class="btn btn--icon" id="btnSettings" title="Settings" aria-label="Settings">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </header>

  <main class="main">
    <!-- System Section -->
    <section class="section section--system">
      <div class="section__header">System</div>
      <div class="section__grid section__grid--3col">
        <div class="card" id="cardCpu" data-metric="cpu_percent">
          <div class="bar">
            <div class="bar__fill" id="fillCpu"></div>
            <span class="bar__label">CPU</span>
            <span class="bar__value" id="valCpu">0<span class="bar__unit">%</span></span>
          </div>
        </div>

        <div class="card" id="cardMemory" data-metric="memory_percent">
          <div class="bar">
            <div class="bar__fill" id="fillMemory"></div>
            <span class="bar__label">Memory</span>
            <span class="bar__detail" id="memDetail"></span>
            <span class="bar__value" id="valMemory">0<span class="bar__unit">%</span></span>
          </div>
        </div>

        <div class="card" id="cardDisk" data-metric="disk_percent">
          <div class="bar">
            <div class="bar__fill" id="fillDisk"></div>
            <span class="bar__label">Disk</span>
            <span class="bar__detail" id="diskDetail"></span>
            <span class="bar__value" id="valDisk">0<span class="bar__unit">%</span></span>
          </div>
        </div>

      </div>
    </section>

    <!-- Claude Section -->
    <section class="section section--claude">
      <div class="section__header">
        <span>Claude</span>
        <span class="section__badge section__badge--claude" id="claudeWebPlan"></span>
        <span class="section__badge section__badge--dim" id="claudeWebDisconnected" style="display:none;">CDP Disconnected</span>
      </div>
      <div class="section__grid" id="cardClaudeBrand">
        <div class="card card--claude" id="cardClaudeSession">
          <div class="bar">
            <div class="bar__fill bar__fill--skeleton" id="fillClaudeSession"></div>
            <span class="bar__label">Session</span>
            <span class="bar__detail" id="detailClaudeSession"></span>
            <span class="bar__value bar__value--muted" id="valClaudeSession">--</span>
          </div>
        </div>

        <div class="card card--claude" id="cardClaudeWeekly">
          <div class="bar">
            <div class="bar__fill bar__fill--skeleton" id="fillClaudeWeekly"></div>
            <span class="bar__label">Weekly</span>
            <span class="bar__detail" id="detailClaudeWeekly"></span>
            <span class="bar__value bar__value--muted" id="valClaudeWeekly">--</span>
          </div>
        </div>

        <div class="card card--claude" id="cardClaudeSonnet">
          <div class="bar">
            <div class="bar__fill bar__fill--skeleton" id="fillClaudeSonnet"></div>
            <span class="bar__label">Sonnet</span>
            <span class="bar__detail" id="detailClaudeSonnet"></span>
            <span class="bar__value bar__value--muted" id="valClaudeSonnet">--</span>
          </div>
        </div>

        <div class="card card--claude" id="cardClaudeExtra">
          <div class="bar bar--info">
            <span class="bar__label">Extra</span>
            <span class="bar__value" id="valClaudeExtra">--</span>
          </div>
        </div>
      </div>
    </section>

    <!-- Copilot Section -->
    <section class="section section--copilot">
      <div class="section__header">
        <span>Copilot</span>
        <span class="section__badge section__badge--copilot" id="copilotPlan"></span>
        <span class="section__badge section__badge--dim" id="copilotWebDisconnected" style="display:none;">CDP Disconnected</span>
      </div>
      <div class="section__grid section__grid--1col" id="cardCopilotBrand">
        <div class="card card--copilot" id="cardCopilotPremium">
          <div class="bar">
            <div class="bar__fill bar__fill--skeleton" id="fillCopilotPremium"></div>
            <span class="bar__label">Premium Requests</span>
            <span class="bar__detail" id="detailCopilotPremium"></span>
            <span class="bar__value bar__value--muted" id="valCopilotPremium">--<span class="bar__unit">%</span></span>
          </div>
        </div>
      </div>
    </section>

    <!-- ZhipuAI Section -->
    <section class="section section--zhipuai">
      <div class="section__header">
        <span>ZhipuAI</span>
        <span class="section__badge section__badge--accent" id="zhipuaiPlan"></span>
      </div>
      <div class="section__grid" id="cardZhipuaiBrand">
        <div class="card card--zhipuai" id="cardZhipuaiTime">
          <div class="bar">
            <div class="bar__fill bar__fill--skeleton" id="fillZhipuaiTime"></div>
            <span class="bar__label">5h Limit</span>
            <span class="bar__detail" id="detailZhipuaiTime"></span>
            <span class="bar__value bar__value--muted" id="valZhipuaiTime">--<span class="bar__unit">%</span></span>
          </div>
        </div>
        <div class="card card--zhipuai" id="cardZhipuaiTokens">
          <div class="bar">
            <div class="bar__fill bar__fill--skeleton" id="fillZhipuaiTokens"></div>
            <span class="bar__label">Tokens</span>
            <span class="bar__detail" id="detailZhipuaiTokens"></span>
            <span class="bar__value bar__value--muted" id="valZhipuaiTokens">--<span class="bar__unit">%</span></span>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Settings Modal -->
  <div class="modal" id="settingsModal">
    <div class="modal__backdrop" id="modalBackdrop"></div>
    <div class="modal__content">
      <div class="modal__header">
        <h2 class="modal__title">Settings</h2>
        <button class="btn btn--icon modal__close" id="btnCloseSettings" aria-label="Close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal__body" id="settingsBody">
        <fieldset class="settings-group">
          <legend class="settings-group__title">API Keys</legend>
          <div class="form-field">
            <label for="keyZhipuai">ZhipuAI</label>
            <input type="password" id="keyZhipuai" placeholder="API key" autocomplete="off">
          </div>
        </fieldset>
        <fieldset class="settings-group">
          <legend class="settings-group__title">Thresholds</legend>
          <div class="threshold-field" data-metric="cpu_percent">
            <span class="threshold-field__label">CPU %</span>
            <div class="threshold-field__inputs">
              <label>Warning <input type="number" class="threshold-input" data-level="warning" min="0" max="100" value="80"></label>
              <label>Critical <input type="number" class="threshold-input" data-level="critical" min="0" max="100" value="95"></label>
            </div>
          </div>
          <div class="threshold-field" data-metric="memory_percent">
            <span class="threshold-field__label">Memory %</span>
            <div class="threshold-field__inputs">
              <label>Warning <input type="number" class="threshold-input" data-level="warning" min="0" max="100" value="80"></label>
              <label>Critical <input type="number" class="threshold-input" data-level="critical" min="0" max="100" value="95"></label>
            </div>
          </div>
          <div class="threshold-field" data-metric="disk_percent">
            <span class="threshold-field__label">Disk %</span>
            <div class="threshold-field__inputs">
              <label>Warning <input type="number" class="threshold-input" data-level="warning" min="0" max="100" value="85"></label>
              <label>Critical <input type="number" class="threshold-input" data-level="critical" min="0" max="100" value="95"></label>
            </div>
          </div>
          <div class="threshold-field" data-metric="token_cost">
            <span class="threshold-field__label">Token Cost ($)</span>
            <div class="threshold-field__inputs">
              <label>Warning <input type="number" class="threshold-input" data-level="warning" min="0" step="0.5" value="10"></label>
              <label>Critical <input type="number" class="threshold-input" data-level="critical" min="0" step="0.5" value="50"></label>
            </div>
          </div>
        </fieldset>
        <fieldset class="settings-group">
          <legend class="settings-group__title">OpenClaw Gateway</legend>
          <div class="form-field">
            <label for="gatewayUrl">Gateway URL</label>
            <input type="url" id="gatewayUrl" placeholder="https://..." autocomplete="off">
          </div>
          <div class="form-field">
            <label for="gatewayKey">API Key</label>
            <input type="password" id="gatewayKey" placeholder="API key" autocomplete="off">
          </div>
        </fieldset>
      </div>
      <div class="modal__footer">
        <button class="btn btn--secondary" id="btnCancelSettings">Cancel</button>
        <button class="btn btn--primary" id="btnSaveSettings">Save</button>
      </div>
    </div>
  </div>

  <script src="/static/js/charts.js"></script>
  <script src="/static/js/websocket.js"></script>
  <script src="/static/js/settings.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
